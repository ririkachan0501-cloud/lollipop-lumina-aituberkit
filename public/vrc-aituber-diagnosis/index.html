<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="VRC診断">
<meta name="theme-color" content="#111827">
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="style.css">
<title>VRC/AITuber診断メーカー</title>
</head>
<body>
<header><h1>VRC/AITuber診断メーカー</h1><p>Safariだけで動作。入力は端末内に保存されます。</p><span class="pill">iPhone対応</span><span class="pill">公開URL版</span><span class="pill">共有OK</span></header>
<main>
<section class="card"><h2>1. 相談内容</h2><label>顧客名/ハンドル</label><input id="client" placeholder="例: 〇〇さん"><label>目的</label><textarea id="goal" placeholder="例: VRChatでAIキャラを立たせて会話できるようにしたい"></textarea><label>現在の症状</label><textarea id="symptom" placeholder="例: マイクが届かない / OSCが反応しない / キャリブレーションボタンが押せない"></textarea><label>ログ/メモ</label><textarea id="logs" placeholder="個人情報・APIキー・トークンは消してから貼る"></textarea></section>
<section class="card"><h2>2. 環境</h2><div class="row"><div><label>PC/GPU</label><input id="pc" placeholder="例: Windows / RTX 4070"></div><div><label>AI構成</label><input id="aiStack" placeholder="例: Ollama / Whisper / Aivis"></div></div><h3>該当領域</h3><div class="checks" id="areas"><label><input type="checkbox" value="VRChat">VRChat</label><label><input type="checkbox" value="AITuber">AITuber</label><label><input type="checkbox" value="音声入力/STT">音声入力/STT</label><label><input type="checkbox" value="TTS/音声出力">TTS/音声出力</label><label><input type="checkbox" value="OSC">OSC</label><label><input type="checkbox" value="SteamVR/OpenXR">SteamVR/OpenXR</label><label><input type="checkbox" value="OBS/配信">OBS/配信</label><label><input type="checkbox" value="GPU/重い">GPU/重い</label></div></section>
<section class="card"><h2>3. 価格計算</h2><label>プラン</label><select id="model"><option value="診断レポート">診断レポート</option><option value="設定代行">設定代行</option><option value="カスタム実装">カスタム実装</option><option value="月額保守">月額保守</option></select><div class="row3"><div><label>価格</label><input id="price" type="number" value="30000"></div><div><label>作業時間</label><input id="hours" type="number" value="3"></div><div><label>目標</label><input id="target" type="number" value="1000000"></div></div><label>販売場所</label><select id="platform"><option value="direct">直接販売</option><option value="booth">BOOTH目安</option><option value="coconala">ココナラ目安</option><option value="note">note目安</option></select><button class="full" onclick="calc()">計算する</button><button class="secondary" onclick="preset(9800,1,'診断レポート')">9,800円</button><button class="secondary" onclick="preset(30000,3,'設定代行')">30,000円</button><button class="secondary" onclick="preset(80000,8,'カスタム実装')">80,000円</button><div id="calcResult" class="resultBox"></div></section>
<section class="card"><h2>4. レポート</h2><button class="full" onclick="generate()">診断レポートを生成</button><button class="secondary" onclick="copyText('report')">コピー</button><button class="secondary" onclick="shareText('report')">共有</button><button class="secondary" onclick="mailText('report')">メール下書き</button><pre id="report">ここにレポートが出ます。</pre></section>
<section class="card"><h2>5. 募集文</h2><button class="full" onclick="sales('short')">X/Discord募集文を作る</button><button class="secondary" onclick="sales('booth')">BOOTH説明</button><button class="secondary" onclick="sales('reply')">相談返信</button><button class="secondary" onclick="copyText('sales')">コピー</button><button class="secondary" onclick="shareText('sales')">共有</button><pre id="sales">ここに販売文が出ます。</pre></section>
<section class="card"><h2>6. 注意</h2><p class="small">このツールは成果、収益、再生数、問題の完全解決を保証しません。入力内容はブラウザ内に保存され、外部送信しません。</p><button class="secondary" onclick="backup()">入力データをコピー</button><button class="secondary" onclick="restore()">入力データを貼り戻す</button><button class="bad" onclick="clearAll()">全消去</button></section>
</main><div class="sticky"><button onclick="generate()">生成</button><button class="secondary" onclick="copyText('report')">コピー</button></div><div id="toast" class="toast"></div>
<script>
const $=id=>document.getElementById(id);const fields=['client','goal','symptom','logs','pc','aiStack','model','price','hours','target','platform'];function toast(m){const t=$('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',1700)}function picked(id){return Array.from(document.querySelectorAll('#'+id+' input:checked')).map(x=>x.value)}function save(){const d={};fields.forEach(id=>d[id]=$(id)?.value||'');d.areas=picked('areas');localStorage.setItem('vrc_diag_data',JSON.stringify(d))}function load(){try{const d=JSON.parse(localStorage.getItem('vrc_diag_data')||'{}');fields.forEach(id=>{if(d[id]!==undefined&&$(id))$(id).value=d[id]});document.querySelectorAll('#areas input').forEach(x=>x.checked=(d.areas||[]).includes(x.value))}catch(e){}}document.addEventListener('input',save);document.addEventListener('change',save);function fee(p,pl){p=Number(p||0);if(pl==='booth')return Math.max(0,Math.ceil(p-(p*.056+45)));if(pl==='coconala')return Math.max(0,Math.floor(p*.725));if(pl==='note')return Math.max(0,Math.floor(p*.82));return p}function calc(){const p=+$('price').value||0,h=+$('hours').value||1,t=+$('target').value||1000000,n=fee(p,$('platform').value),need=n?Math.ceil(t/n):0;$('calcResult').innerHTML='<div>1件手取り目安</div><div class="big">'+n.toLocaleString()+'円</div><div>目標まで: <b>'+need+'件</b> / 作業目安: <b>'+(need*h).toLocaleString()+'時間</b></div><div class="small">推奨: 診断→設定代行→実装支援の順に単価を上げる。</div>'}function preset(p,h,m){$('price').value=p;$('hours').value=h;$('model').value=m;save();calc()}function infer(){const text=($('symptom').value+'\n'+$('logs').value+'\n'+picked('areas').join(' ')).toLowerCase();let c=[],a=[];if(/openxr|steamvr|キャリブ|レーザー|ui|ボタン/.test(text)){c.push('VRChat側がSteamVR Legacy BindingではなくOpenXR入力を見ており、仮想入力が届いていない可能性');a.push('SteamVR入力・OpenXR Runtime・VRChat側入力・レーザー当たり判定を分けて検証する')}if(/osc/.test(text)){c.push('OSCのポート、送信先、パラメータ名、VRChat側OSC有効化の不一致の可能性');a.push('最小OSC送信で /avatar/parameters/... が届くか確認する')}if(/マイク|stt|whisper|音声入力/.test(text)){c.push('入力デバイス、サンプルレート、VAD、TTS回り込みが混ざっている可能性');a.push('テストWAV入力でSTT単体を確認し、物理マイク問題と分離する')}if(/tts|aivis|音声出力/.test(text)){c.push('TTS生成先とVRChat入力先のルーティングが分離できていない可能性');a.push('TTS出力、VRChat入力、モニター音を表にして分ける')}if(/obs|配信|twitch/.test(text)){c.push('OBS、VRChat、AI応答音の経路が混ざっている可能性');a.push('OBS用、VRC用、確認用の音声経路を分離する')}if(/gpu|vram|cuda|重い/.test(text)){c.push('LLM/STT/TTS/VRChat/OBSがGPUまたはVRAMを取り合っている可能性');a.push('VRAM使用量、STTモデル、LLM量子化、OBSエンコード方式を確認する')}if(!c.length){c.push('原因はまだ断定できない。再現条件とログの追加確認が必要');a.push('入力→AI処理→出力→VRChat/配信側の4段階で止まる場所を切り分ける')}return{c,a}}function generate(){const inf=infer(),areas=picked('areas'),p=+$('price').value||0,n=fee(p,$('platform').value);const r=`# VRC/AITuber 診断レポート\n\n## 結論\n${inf.c[0]}\n\n## 顧客\n${$('client').value||'未記入'}\n\n## 目的\n${$('goal').value||'未記入'}\n\n## 症状\n${$('symptom').value||'未記入'}\n\n## 環境\n- PC/GPU: ${$('pc').value||'未記入'}\n- AI構成: ${$('aiStack').value||'未記入'}\n- 該当領域: ${areas.length?areas.join(' / '):'未選択'}\n\n## 推定原因\n${inf.c.map((x,i)=>`${i+1}. ${x}`).join('\n')}\n\n## 具体策\n${inf.a.map((x,i)=>`${i+1}. ${x}`).join('\n')}\n\n## 追加で必要な情報\n- ツール名とバージョン\n- 再現手順\n- エラー全文またはログ\n- 画面スクリーンショット\n- 直近で変更した設定\n- APIキー、トークン、個人情報を伏せた設定ファイル\n\n## 提案プラン\n- プラン: ${$('model').value}\n- 価格: ${p.toLocaleString()}円\n- 手取り目安: ${n.toLocaleString()}円\n- 想定作業時間: ${$('hours').value||'未記入'}時間\n\n## 免責\nこの診断は収益、再生数、問題の完全解決を保証するものではありません。\n原因切り分けと設定/実装支援を目的とします。`;$('report').textContent=r;localStorage.setItem('vrc_diag_report',r);save();toast('生成しました')}async function copyText(id){const text=$(id).textContent||'';try{await navigator.clipboard.writeText(text);toast('コピーしました')}catch(e){prompt('コピーしてください',text)}}async function shareText(id){const text=$(id).textContent||'';if(navigator.share){try{await navigator.share({title:'VRC/AITuber診断',text});return}catch(e){}}copyText(id)}function mailText(id){location.href='mailto:?subject='+encodeURIComponent('VRC/AITuber診断レポート')+'&body='+encodeURIComponent($(id).textContent||'')}function sales(k){const price=(+$('price').value||30000).toLocaleString();let s='';if(k==='short')s=`【VRC/AITuberまわりの診断できます】\n\n・AIキャラをVRChatに立たせたい\n・OSCが動かない\n・マイク/STT/TTSの経路がわからない\n・SteamVR/OpenXRまわりで詰まっている\n・配信中にAIが反応しない/重い\n\nログと画面を見て、原因候補・確認手順・次に触る設定をレポート化します。\n診断目安: ${price}円〜\n※成果保証ではなく、原因切り分けと実装/設定支援です。`;else if(k==='booth')s='# VRC/AITuber 診断レポート作成サービス\n\nVRChat、AITuber、OSC、音声入力、TTS、SteamVR/OpenXR、OBS配信まわりで詰まっている方向けに、状況を整理して診断レポートを作成します。\n\n## 納品内容\n- 症状整理\n- 推定原因\n- 確認手順\n- 触るべき設定/ファイル\n- 再発防止チェックリスト\n\n## 注意\n成果、収益、再生数、VRChat内での完全自動操作は保証しません。';else s='状況ありがとうございます。\nまず原因を決め打ちせず、入力→AI処理→音声出力→VRChat/配信側の受け取り、の4段階に分けて確認します。\n\n送ってほしいもの:\n1. 症状が出る直前から直後までのログ\n2. 画面スクショ\n3. 使用ツール名とバージョン\n4. 期待していた動作\n5. 直近で変えた設定\n\n個人情報、APIキー、トークンは必ず伏せてください。';$('sales').textContent=s;toast('作成しました')}function backup(){const d=localStorage.getItem('vrc_diag_data')||'{}';navigator.clipboard.writeText(d).then(()=>toast('入力データをコピーしました')).catch(()=>prompt('コピーしてください',d))}function restore(){const s=prompt('コピーした入力データを貼ってください');if(!s)return;try{JSON.parse(s);localStorage.setItem('vrc_diag_data',s);load();toast('復元しました')}catch(e){toast('復元できませんでした')}}function clearAll(){if(!confirm('入力と保存データを消しますか？'))return;localStorage.removeItem('vrc_diag_data');localStorage.removeItem('vrc_diag_report');location.reload()}if('serviceWorker'in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}load();$('report').textContent=localStorage.getItem('vrc_diag_report')||'ここにレポートが出ます。';calc();
</script></body></html>
